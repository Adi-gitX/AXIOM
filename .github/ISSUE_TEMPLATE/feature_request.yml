name: ✨ Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Great ideas make AXIOM better for everyone.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe what you'd like to happen
      placeholder: Describe the ideal solution...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or features you've considered?
      placeholder: Describe alternatives...
    validations:
      required: false

  - type: dropdown
    id: module
    attributes:
      label: Module
      description: Which module would this feature belong to?
      options:
        - Dashboard
        - DSA Tracker
        - OSS Engine
        - GSOC Accelerator
        - Education Hub
        - Interview Prep
        - Jobs
        - Posts
        - Developer Connect
        - Profile / Portfolio
        - New Module
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Important
        - Critical for my workflow
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, mockups, links, or any other context
      placeholder: Add any other context...
    validations:
      required: false
