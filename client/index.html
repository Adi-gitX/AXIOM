  <!-- JSON-LD Structured Data: FAQPage (for search rich snippets) -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is AXIOM?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AXIOM is a free, open-source developer career command center that combines DSA tracking (1,096 problems), OSS contribution management, GSOC preparation, interview prep, job discovery, and a public portfolio into one unified platform for students and early-career developers."
          }
        },
        {
          "@type": "Question",
          "name": "Is AXIOM free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, AXIOM is completely free and open-source under the MIT license. All core features including DSA tracking, OSS engine, GSOC accelerator, education hub, interview prep, and job board are available at no cost."
          }
        },
        {
          "@type": "Question",
          "name": "How does the DSA tracker work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AXIOM's DSA tracker includes 1,096 problems across three popular sheets: Love Babbar 450, Striver SDE, and Striver A2Z. It features spaced repetition for review scheduling, per-problem notes and time tracking, a GitHub-style activity heatmap, and streak tracking for consistent practice."
          }
        },
        {
          "@type": "Question",
          "name": "How is AXIOM different from LeetCode?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "While LeetCode focuses only on DSA practice, AXIOM is a complete developer growth platform that combines DSA tracking with OSS contribution management, GSOC preparation, interview prep, education resources, job hunting, community chat, and a public portfolio — all in one place with unified progress tracking."
          }
        },
        {
          "@type": "Question",
          "name": "Can I contribute to AXIOM?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Absolutely! AXIOM is open source and welcomes contributions. Check the Contributing Guide on GitHub for setup instructions, and look for 'good first issue' labeled issues to get started. All contributors are recognized in the project README."
          }
        }
      ]
    }
    </script>
